<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Usuários</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn:hover {
            background: #5568d3;
        }
        .btn-voltar {
            background: #666;
            margin-top: 10px;
        }
        .btn-voltar:hover {
            background: #555;
        }
        .sem-dados {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lista de Usuários Cadastrados</h1>
        <div id="loading" class="loading">Carregando...</div>
        <table id="tabelaUsuarios" style="display: none;">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Idade</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
            </tbody>
        </table>
        <div id="semDados" class="sem-dados" style="display: none;">
            Nenhum usuário cadastrado.
        </div>
        <a href="index.html" class="btn btn-voltar">Voltar</a>
    </div>

    <script>
        async function carregarUsuarios() {
            try {
                const response = await fetch('/exemplo-webapi/usuarios');
                const usuarios = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (usuarios.length === 0) {
                    document.getElementById('semDados').style.display = 'block';
                } else {
                    document.getElementById('tabelaUsuarios').style.display = 'table';
                    const corpoTabela = document.getElementById('corpoTabela');
                    
                    usuarios.forEach(usuario => {
                        const linha = document.createElement('tr');
                        linha.innerHTML = `
                            <td>${usuario.nome}</td>
                            <td>${usuario.email}</td>
                            <td>${usuario.idade}</td>
                        `;
                        corpoTabela.appendChild(linha);
                    });
                }
            } catch (error) {
                document.getElementById('loading').textContent = 'Erro ao carregar usuários!';
                document.getElementById('loading').style.color = 'red';
            }
        }

        carregarUsuarios();
    </script>
</body>
</html>
